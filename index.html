        {
          "@type": "Question",
          "name": "¿Ofreces una primera clase gratuita?",
          "acceptedAnswer": {
            "@type": "Answer",

        },
        {
          "@type": "Question",
          "name": "¿Las clases son online o presenciales?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "La mayoría de las clases se realizan online a través de Google Meet. Vivo en Castelldefels y a veces puedo dar clases presenciales en Castelldefels, Gavà y zonas cercanas si el horario y la ubicación encajan."
          }
        },
        {
          "@type": "Question",
          "name": "¿Cuál es tu método de enseñanza?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Mis clases son prácticas y centradas en conversación real. Trabajamos pronunciación, vocabulario, gramática útil y los hábitos que suelen bloquear a los hispanohablantes."

        },
        {
          "@type": "Question",
          "name": "¿Preparas exámenes de Cambridge como First Certificate?",
